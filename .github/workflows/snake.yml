name: 🐍 Generate Contribution Snake

# Runs daily, on every push to main, and can be triggered manually.
on:
  schedule:
    - cron: "0 3 * * *"   # every day at 03:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

# The default GITHUB_TOKEN needs write access to push the generated
# SVGs to the "output" branch.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
            dist/snake-sunset.svg?color_snake=#ec4899&color_dots=#1a1212,#7c2d12,#c2410c,#ea580c,#fb923c

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
